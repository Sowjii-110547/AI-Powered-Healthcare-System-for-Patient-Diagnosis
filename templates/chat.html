<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthcare AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg: linear-gradient(135deg, #0f172a, #1e293b);
  --card: #1e293b;
  --user: #3b82f6;
  --ai: #10b981;
  --text: #f1f5f9;
  --accent: #06b6d4;
  --border: #334155;
}

*{ box-sizing:border-box; font-family:Segoe UI, Arial; }

body{
  margin:0;
  background: var(--bg);
  height:100vh;
  display:flex;
  color:var(--text);
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;
  background: var(--card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.sidebar button{
  margin:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg, var(--user), var(--ai));
  color: var(--text);
  cursor:pointer;
}

.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat-item{
  padding:10px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
  font-size:14px;
}
.chat-item:hover{ background: rgba(255, 255, 255, 0.05); }

/* ===== CHAT ===== */
.chat-container{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  background: linear-gradient(90deg, var(--user), var(--ai));
  text-align:center;
  font-size:18px;
  font-weight:600;
}

.chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:15px;
  margin-bottom:10px;
  line-height:1.4;
  white-space:pre-line;
}

.user{
  background:var(--user);
  margin-left:auto;
  border-bottom-right-radius:4px;
}

.ai-wrap{
  display:flex;
  align-items:flex-start;
  margin-bottom:10px;
}

.ai{
  background:var(--ai);
  border-bottom-left-radius:4px;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background: var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:8px;
}

.input-area{
  display:flex;
  padding:10px;
  gap:8px;
  background: var(--card);
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  background: rgba(0, 0, 0, 0.2);
  color: var(--text);
}

button.send{
  padding:12px 16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background: linear-gradient(90deg, var(--user), var(--ai));
  color: var(--text);
  font-size:18px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="newChat()">➕ New Chat</button>
  <div id="chatList" class="chat-list"></div>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div class="header">🩺 Healthcare AI Assistant</div>

  <div id="chat" class="chat-box"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type your symptoms here…" />
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<script>
let chats = {};
let chatTitles = {};
let chatTimestamps = {};
let currentChatId = null;

try {
  chats = JSON.parse(localStorage.getItem("healthChats")) || {};
  chatTitles = JSON.parse(localStorage.getItem("healthChatTitles")) || {};
  chatTimestamps = JSON.parse(localStorage.getItem("healthChatTimestamps")) || {};
  currentChatId = localStorage.getItem("currentChatId");
} catch (e) {
  console.warn("Corrupted chat data detected, resetting storage");
  localStorage.removeItem("healthChats");
  localStorage.removeItem("healthChatTitles");
  localStorage.removeItem("healthChatTimestamps");
  localStorage.removeItem("currentChatId");
}

// Clean up chats older than 9 days (9 * 24 * 60 * 60 * 1000 = 777600000 ms)
const MAX_CHAT_AGE = 9 * 24 * 60 * 60 * 1000;

function cleanupOldChats() {
  const now = Date.now();
  const toDelete = [];
  
  Object.keys(chatTimestamps).forEach(id => {
    if (now - chatTimestamps[id] > MAX_CHAT_AGE) {
      toDelete.push(id);
    }
  });
  
  toDelete.forEach(id => {
    delete chats[id];
    delete chatTitles[id];
    delete chatTimestamps[id];
    if (id === currentChatId) {
      localStorage.removeItem("currentChatId");
      currentChatId = null;
    }
  });
  
  if (toDelete.length > 0) {
    saveAll();
  }
}

/* ENTER to send */
msg.addEventListener("keydown", e => {
  if(e.key==="Enter"){ e.preventDefault(); send(); }
});

/* INIT */
cleanupOldChats();
if(!currentChatId || !chats[currentChatId]){ 
  newChat(); 
}
else{ 
  loadChat(currentChatId); 
}
renderChatList();

/* NEW CHAT */
function newChat(){
  currentChatId = "chat_" + Date.now();
  const timestamp = Date.now();
  chats[currentChatId] = `
    <div class="ai-wrap">
      <div class="avatar">👨‍⚕</div>
      <div class="msg ai">👋 Hi! Please describe your symptoms or health concern.</div>
    </div>`;
  chatTitles[currentChatId] = "New Health Chat";
  chatTimestamps[currentChatId] = timestamp;
  saveAll();
  loadChat(currentChatId);
}

/* LOAD CHAT */
function loadChat(id){
  if (!chats[id]) {
    console.warn(`Chat ${id} not found, creating new chat`);
    newChat();
    return;
  }
  currentChatId = id;
  chat.innerHTML = chats[id];
  localStorage.setItem("currentChatId", id);
}

/* DELETE CHAT */
function deleteChat(id){
  if(!confirm("Delete this chat?")) return;
  delete chats[id];
  delete chatTitles[id];
  delete chatTimestamps[id];
  if(id === currentChatId){
    localStorage.removeItem("currentChatId");
    newChat();
  }
  saveAll();
}

/* SAVE */
function saveAll(){
  try {
    localStorage.setItem("healthChats", JSON.stringify(chats));
    localStorage.setItem("healthChatTitles", JSON.stringify(chatTitles));
    localStorage.setItem("healthChatTimestamps", JSON.stringify(chatTimestamps));
    renderChatList();
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      alert("Storage full! Old chats will be automatically cleaned up.");
      cleanupOldChats();
      // Try again after cleanup
      try {
        localStorage.setItem("healthChats", JSON.stringify(chats));
        localStorage.setItem("healthChatTitles", JSON.stringify(chatTitles));
        localStorage.setItem("healthChatTimestamps", JSON.stringify(chatTimestamps));
        renderChatList();
      } catch (e2) {
        alert("Storage still full. Please delete some chats manually.");
      }
    } else {
      console.error("Storage error:", e);
    }
  }
}

function getRelativeTime(timestamp) {
  const now = Date.now();
  const diff = now - timestamp;
  const days = Math.floor(diff / (24 * 60 * 60 * 1000));
  
  if (days === 0) return "today";
  if (days === 1) return "1 day ago";
  if (days < 7) return `${days} days ago`;
  if (days < 9) return `${days} days ago ⚠️`;
  return `${days} days ago (will be deleted soon)`;
}

/* CHAT LIST */
function renderChatList(){
  chatList.innerHTML="";
  Object.keys(chats).reverse().forEach(id=>{
    const div=document.createElement("div");
    div.className="chat-item";
    const timestamp = chatTimestamps[id] || Date.now();
    const timeAgo = getRelativeTime(timestamp);
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span>💬 ${chatTitles[id]}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
          <span style="cursor:pointer;font-size:12px;" onclick="deleteChat('${id}'); event.stopPropagation();">🗑</span>
          <span style="font-size:10px;color:#94a3b8;">${timeAgo}</span>
        </div>
      </div>`;
    div.onclick = () => loadChat(id);
    chatList.appendChild(div);
  });
}

/* SEND */
function send(){
  const text = msg.value.trim();
  if(!text) return;

  addUser(text);
  msg.value="";

  if(chatTitles[currentChatId]==="New Health Chat"){
    chatTitles[currentChatId] = text.slice(0,25)+"...";
  }

  // Add loading state
  const sendBtn = document.querySelector('.send');
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳';

  fetch("/chat",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ message:text })
  })
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(d => {
    addAI(d.reply);
    chats[currentChatId]=chat.innerHTML;
    saveAll();
  })
  .catch(e => {
    console.error("Chat error:", e);
    addAI("❌ Sorry, there was an error sending your message. Please try again.");
  })
  .finally(() => {
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
  });
}

/* UI MSGS */
function addUser(t){
  const d=document.createElement("div");
  d.className="msg user";
  d.textContent=t;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addAI(t){
  const w=document.createElement("div");
  w.className="ai-wrap";
  w.innerHTML=`<div class="avatar">👨‍⚕</div><div class="msg ai">${t.replace(/\n/g,"<br>")}</div>`;
  chat.appendChild(w);
  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
